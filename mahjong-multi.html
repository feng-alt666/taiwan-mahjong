<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>台灣麻將 多人連線</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=Fredoka+One&display=swap');
:root{
  --green:#1a6b3a;--gl:#2d8a4e;--gd:#0f4424;
  --gold:#f0c040;--god:#c8960c;
  --red:#e03030;--tile:#fdf6e3;--tb:#c8a060;--ts:#8b5e1a;
  --dk:#1a1a1a;--lt:#f5f0e8;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Noto Sans TC',sans-serif;background:var(--gd);color:var(--lt);min-height:100vh;overflow-x:hidden;user-select:none;}
.screen{display:none;min-height:100vh;flex-direction:column;align-items:center;}
.screen.active{display:flex;}

#s-connect{background:radial-gradient(ellipse at 50% 30%,#2d8a4e,#0f4424 60%,#08291a);justify-content:center;padding:30px 20px;}
.logo{text-align:center;margin-bottom:28px;}
.logo h1{font-family:'Fredoka One',cursive;font-size:clamp(36px,8vw,64px);color:var(--gold);text-shadow:4px 4px 0 #8b5e00,0 0 40px rgba(240,192,64,.4);line-height:1;}
.logo p{font-size:12px;color:rgba(255,255,255,.4);margin-top:4px;letter-spacing:4px;text-transform:uppercase;}
.card{background:rgba(255,255,255,.06);border:1px solid rgba(240,192,64,.25);border-radius:20px;padding:28px;width:100%;max-width:520px;backdrop-filter:blur(10px);}
.card h2{font-size:15px;color:var(--gold);margin-bottom:14px;}
.inp{background:rgba(255,255,255,.1);border:1.5px solid rgba(255,255,255,.2);border-radius:10px;padding:11px 14px;font-size:15px;color:#fff;font-family:'Noto Sans TC',sans-serif;outline:none;width:100%;}
.inp:focus{border-color:var(--gold);}
.inp::placeholder{color:rgba(255,255,255,.3);}
.inp.code-inp{letter-spacing:6px;text-transform:uppercase;text-align:center;font-size:22px;font-family:monospace;}
.num-row{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.num-row label{font-size:13px;color:rgba(255,255,255,.55);min-width:72px;}
.btn-p{width:100%;padding:14px;background:linear-gradient(135deg,var(--gold),var(--god));border:none;border-radius:12px;font-size:16px;font-weight:700;color:#1a1a00;cursor:pointer;font-family:'Noto Sans TC',sans-serif;transition:all .2s;}
.btn-p:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(240,192,64,.4);}
.btn-p:disabled{opacity:.4;cursor:not-allowed;transform:none;}
.btn-s{padding:11px 18px;background:rgba(255,255,255,.08);border:1.5px solid rgba(255,255,255,.2);border-radius:10px;color:#fff;font-size:13px;font-family:'Noto Sans TC',sans-serif;cursor:pointer;transition:all .2s;}
.btn-s:hover{border-color:var(--gold);color:var(--gold);}
.divider{display:flex;align-items:center;gap:12px;margin:16px 0;font-size:12px;color:rgba(255,255,255,.3);}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:rgba(255,255,255,.1);}
.char-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:14px;}
.cc{background:rgba(255,255,255,.06);border:2px solid rgba(255,255,255,.1);border-radius:12px;padding:12px 6px;cursor:pointer;text-align:center;transition:all .2s;}
.cc:hover,.cc.sel{border-color:var(--gold);transform:translateY(-2px);}
.cc.sel{background:rgba(240,192,64,.12);}
.cc .ce{font-size:28px;margin-bottom:4px;}
.cc .cn{font-size:11px;font-weight:500;}
.cc .ct{font-size:9px;color:rgba(255,255,255,.35);margin-top:1px;}

#s-lobby{background:radial-gradient(ellipse at 50% 20%,#1a3060,#0a1428 60%,#050c18);justify-content:center;padding:30px 20px;}
.lobby-box{max-width:520px;width:100%;}
.lobby-box h2{font-family:'Fredoka One',cursive;font-size:28px;color:var(--gold);text-align:center;margin-bottom:4px;}
.room-code-display{background:rgba(240,192,64,.1);border:1.5px solid rgba(240,192,64,.35);border-radius:14px;padding:18px;text-align:center;margin-bottom:20px;}
.room-code-display .code{font-size:40px;font-family:monospace;letter-spacing:8px;color:var(--gold);font-weight:700;}
.room-code-display .share-url{font-size:11px;color:rgba(255,255,255,.4);margin-top:6px;word-break:break-all;}
.player-slots{display:grid;gap:8px;margin-bottom:20px;}
.pslot{display:flex;align-items:center;gap:10px;background:rgba(255,255,255,.06);border:1.5px solid rgba(255,255,255,.1);border-radius:12px;padding:12px 14px;}
.pslot.filled{border-color:rgba(45,138,78,.6);background:rgba(45,138,78,.08);}
.pslot.empty{border-style:dashed;opacity:.5;}
.pslot .pem{font-size:26px;}
.pslot .pnm{font-size:13px;font-weight:700;}
.pslot .pts{font-size:11px;color:rgba(255,255,255,.4);}
.pslot .pbadge{margin-left:auto;font-size:10px;background:rgba(240,192,64,.15);border:1px solid rgba(240,192,64,.3);border-radius:5px;padding:2px 7px;color:var(--gold);}
.config-box{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:12px;padding:16px;margin-bottom:16px;}
.config-box h3{font-size:13px;color:rgba(255,255,255,.5);margin-bottom:12px;}

#s-dice{background:radial-gradient(ellipse at 50% 50%,#2a2060,#0e0a28);justify-content:center;align-items:center;padding:40px 20px;text-align:center;}
.dice-box{max-width:460px;width:100%;}
.dice-box h2{font-family:'Fredoka One',cursive;font-size:30px;color:var(--gold);margin-bottom:6px;}
.dice-row{display:flex;justify-content:center;gap:18px;margin:24px 0;}
.die{width:68px;height:68px;background:rgba(255,255,255,.95);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:38px;color:#111;box-shadow:0 4px 16px rgba(0,0,0,.5);}
.die.roll{animation:spin .5s ease-out;}
@keyframes spin{0%{transform:rotateY(0);}50%{transform:rotateY(180deg) scale(1.15);}100%{transform:rotateY(360deg);}}
.dice-result{background:rgba(255,255,255,.06);border:1px solid rgba(240,192,64,.25);border-radius:14px;padding:18px;font-size:14px;line-height:2.2;color:rgba(255,255,255,.8);}
.dice-result strong{color:var(--gold);}

#s-game{background:radial-gradient(ellipse at 50% 50%,#2a7a44,#1a5530 50%,#0f3820);padding:0;justify-content:flex-start;}
.game-layout{display:grid;grid-template-rows:auto auto 1fr auto auto;width:100%;max-width:960px;margin:0 auto;min-height:100vh;padding:8px;gap:6px;}
.topbar{display:flex;justify-content:space-between;align-items:center;background:rgba(0,0,0,.45);border-radius:10px;padding:7px 14px;font-size:12px;flex-wrap:wrap;gap:6px;}
.round-info{font-weight:700;color:var(--gold);}
.top-stats{display:flex;gap:10px;font-size:12px;flex-wrap:wrap;align-items:center;}
.top-stats span{color:rgba(255,255,255,.55);}
.top-stats strong{color:var(--gold);}

/* 催促按鈕 */
.btn-hurry{padding:5px 12px;background:rgba(224,48,48,.18);border:1.5px solid var(--red);border-radius:8px;color:var(--red);font-size:12px;font-weight:700;font-family:'Noto Sans TC',sans-serif;cursor:pointer;transition:all .2s;animation:hurry-pulse 1.5s infinite;}
.btn-hurry:hover{background:rgba(224,48,48,.35);transform:scale(1.05);}
.btn-hurry:disabled{opacity:.4;cursor:not-allowed;animation:none;}
@keyframes hurry-pulse{0%,100%{box-shadow:0 0 0 0 rgba(224,48,48,.45);}50%{box-shadow:0 0 0 7px rgba(224,48,48,0);}}

.opp-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;}
.pp{background:rgba(0,0,0,.35);border:1.5px solid rgba(255,255,255,.1);border-radius:12px;padding:8px 10px;position:relative;transition:border-color .3s,box-shadow .3s;}
.pp.active{border-color:var(--gold);box-shadow:0 0 14px rgba(240,192,64,.3);}
.pp.dealer::before{content:'莊';position:absolute;top:5px;right:7px;font-size:10px;color:var(--red);font-weight:700;}
.ph{display:flex;align-items:center;gap:6px;margin-bottom:5px;}
.pav{font-size:22px;}
.pnm{font-size:12px;font-weight:700;}
.pch{font-size:10px;color:var(--gold);}
.wb{display:inline-flex;align-items:center;justify-content:center;width:18px;height:18px;background:rgba(240,192,64,.12);border:1px solid rgba(240,192,64,.3);border-radius:4px;font-size:10px;font-weight:700;color:var(--gold);margin-left:auto;}
.back-row{display:flex;gap:2px;flex-wrap:wrap;}
.tb-back{width:14px;height:20px;background:linear-gradient(135deg,#3a6a8a,#2a4a6a);border-radius:2px;border:1px solid rgba(255,255,255,.15);}
.opp-meld{display:flex;gap:2px;flex-wrap:wrap;margin-top:4px;}
.flower-str{font-size:10px;color:#c080e8;margin-top:3px;}

/* 棄牌區 - 大一點，隨機擺放 */
.table-c{background:rgba(0,0,0,.2);border-radius:14px;border:1px solid rgba(255,255,255,.05);display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding:10px 14px;min-height:130px;overflow:hidden;}
.dlbl{font-size:10px;color:rgba(255,255,255,.35);margin-bottom:6px;align-self:flex-start;}
.dpile{position:relative;width:100%;min-height:110px;}

/* 牌面 - 清楚的圖案 */
.tile{display:inline-flex;flex-direction:column;align-items:center;justify-content:center;background:var(--tile);border:1.5px solid var(--tb);border-radius:5px;box-shadow:0 2px 0 var(--ts),inset 0 1px 0 rgba(255,255,255,.8);cursor:pointer;transition:transform .12s,box-shadow .12s;position:relative;flex-shrink:0;overflow:hidden;line-height:1;}
.tile.sm{width:24px;height:34px;}
.tile.md{width:36px;height:50px;}
.tile.lg{width:48px;height:68px;}
.tile.sel{transform:translateY(-12px)!important;box-shadow:0 14px 0 var(--ts);border-color:#e03030;border-width:2px;}
.tile.dt{cursor:default;}
.tile.last-d{border-color:#e03030;border-width:2px;box-shadow:0 2px 0 var(--ts),0 0 12px rgba(224,48,48,.6);}
.tile:hover:not(.dt):not(.sel){transform:translateY(-5px);}

/* 棄牌區牌絕對定位 */
.dpile .tile{position:absolute;}

/* 牌面內容 */
.tn{font-size:inherit;font-weight:900;line-height:1;text-align:center;}
.ts2{font-size:inherit;line-height:1;opacity:.75;}

/* 萬 */
.tile.sm .t-wan{font-size:14px;color:#cc1111;}
.tile.md .t-wan{font-size:20px;color:#cc1111;}
.tile.lg .t-wan{font-size:26px;color:#cc1111;}
/* 索 */
.tile.sm .t-suo{font-size:13px;color:#115511;}
.tile.md .t-suo{font-size:18px;color:#115511;}
.tile.lg .t-suo{font-size:24px;color:#115511;}
/* 餅 */
.tile.sm .t-bing{font-size:13px;color:#111188;}
.tile.md .t-bing{font-size:18px;color:#111188;}
.tile.lg .t-bing{font-size:24px;color:#111188;}
/* 字牌 */
.tile.sm .t-honor{font-size:13px;}
.tile.md .t-honor{font-size:19px;}
.tile.lg .t-honor{font-size:26px;}
/* 花牌 */
.tile.flower-t{background:#fff8ff;}
.tile.sm .t-flower{font-size:11px;}
.tile.md .t-flower{font-size:16px;}
.tile.lg .t-flower{font-size:22px;}

.tile-corner{position:absolute;font-size:8px;font-weight:700;line-height:1;}
.tile-corner.tl{top:2px;left:3px;}
.tile-corner.br{bottom:2px;right:2px;transform:rotate(180deg);}

.self-panel{background:rgba(0,0,0,.4);border:1.5px solid rgba(255,255,255,.15);border-radius:12px;padding:10px 14px;}
.self-hd{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.self-tiles{display:flex;gap:4px;flex-wrap:wrap;align-items:flex-end;min-height:72px;}
.meld-g{display:flex;gap:2px;}
.hsep{width:2px;height:52px;background:rgba(255,255,255,.12);border-radius:1px;margin:0 4px;align-self:flex-end;}
.sel-hint{font-size:11px;color:rgba(255,255,255,.45);margin-top:5px;min-height:16px;}
.actions{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap;}
.abtn{padding:8px 14px;border-radius:8px;border:2px solid;font-size:13px;font-weight:700;font-family:'Noto Sans TC',sans-serif;cursor:pointer;transition:all .15s;white-space:nowrap;}
.abtn:hover:not(:disabled){transform:translateY(-2px);}
.abtn:disabled{opacity:.3;cursor:not-allowed;transform:none!important;}
.abtn.draw{background:rgba(240,192,64,.12);border-color:var(--gold);color:var(--gold);}
.abtn.disc{background:rgba(224,48,48,.18);border-color:var(--red);color:var(--red);font-size:14px;}
.abtn.disc:not(:disabled){animation:disc-ready .9s infinite;}
@keyframes disc-ready{0%,100%{box-shadow:0 0 0 0 rgba(224,48,48,.5);}50%{box-shadow:0 0 0 8px rgba(224,48,48,0);}}
.abtn.pong{background:rgba(64,180,240,.12);border-color:#40b4f0;color:#40b4f0;}
.abtn.chi{background:rgba(64,240,140,.12);border-color:#40f08c;color:#40f08c;}
.abtn.kong{background:rgba(200,100,240,.12);border-color:#c864f0;color:#c864f0;}
.abtn.win{background:rgba(240,192,64,.2);border-color:var(--gold);color:var(--gold);animation:pulse 1s infinite;}
.abtn.pass{background:rgba(255,255,255,.06);border-color:rgba(255,255,255,.15);color:rgba(255,255,255,.4);}
.abtn.settle{background:rgba(255,100,100,.1);border-color:#ff6464;color:#ff6464;}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(240,192,64,.4);}50%{box-shadow:0 0 0 8px rgba(240,192,64,0);}}

.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.78);z-index:100;align-items:center;justify-content:center;padding:20px;}
.overlay.active{display:flex;}
.win-modal{background:linear-gradient(135deg,#1a3a1a,#0a2810);border:2px solid var(--gold);border-radius:22px;padding:26px;text-align:center;max-width:460px;width:100%;box-shadow:0 0 60px rgba(240,192,64,.3);}
.win-modal .wc{font-size:52px;margin-bottom:4px;}
.win-modal h2{font-family:'Fredoka One',cursive;font-size:36px;color:var(--gold);margin-bottom:3px;}
.win-modal .wm{font-size:12px;color:rgba(255,255,255,.45);margin-bottom:10px;}
.yaku-box{background:rgba(255,255,255,.05);border-radius:10px;padding:10px 14px;margin:8px 0;text-align:left;}
.yr{display:flex;justify-content:space-between;font-size:12px;padding:2px 0;}
.yn{color:rgba(255,255,255,.65);}
.ys{color:var(--gold);font-weight:700;}
.ytotal{font-size:15px;color:var(--gold);font-weight:700;border-top:1px solid rgba(240,192,64,.25);margin-top:5px;padding-top:5px;display:flex;justify-content:space-between;}
.pay-box{display:grid;gap:5px;margin:8px 0;}
.pr{display:flex;justify-content:space-between;font-size:12px;background:rgba(255,255,255,.04);border-radius:7px;padding:6px 10px;}
.pn{color:rgba(255,255,255,.65);}
.pos{color:#40f08c;font-weight:700;}
.neg{color:#f06060;font-weight:700;}
.settle-modal{background:linear-gradient(135deg,#1a1a3a,#0a0a28);border:2px solid rgba(240,192,64,.4);border-radius:22px;padding:26px;text-align:center;max-width:460px;width:100%;}
.settle-modal h2{font-family:'Fredoka One',cursive;font-size:28px;color:var(--gold);margin-bottom:4px;}
.settle-modal p{font-size:12px;color:rgba(255,255,255,.4);margin-bottom:16px;}
.settle-row{display:flex;align-items:center;gap:10px;background:rgba(255,255,255,.06);border-radius:12px;padding:11px 14px;margin-bottom:6px;}
.sc{font-size:26px;}.si{flex:1;text-align:left;}.sn{font-size:13px;font-weight:700;}.ss{font-size:11px;color:rgba(255,255,255,.4);}
.sd{font-size:15px;font-weight:700;}
.chi-modal{background:#1a3a1a;border:2px solid var(--gold);border-radius:18px;padding:22px;max-width:360px;width:100%;text-align:center;}
.chi-modal h3{color:var(--gold);margin-bottom:12px;font-size:15px;}
.chi-opts{display:flex;flex-direction:column;gap:8px;}
.chi-opt{background:rgba(255,255,255,.06);border:1.5px solid rgba(255,255,255,.15);border-radius:10px;padding:10px;cursor:pointer;transition:all .2s;display:flex;justify-content:center;gap:4px;}
.chi-opt:hover{border-color:var(--gold);}
.conn-badge{position:fixed;top:8px;right:8px;font-size:11px;padding:4px 10px;border-radius:20px;background:rgba(0,0,0,.6);border:1px solid;z-index:200;}
.conn-badge.ok{border-color:#40f08c;color:#40f08c;}
.conn-badge.err{border-color:#f06060;color:#f06060;}
.conn-badge.wait{border-color:var(--gold);color:var(--gold);}
.toast{position:fixed;top:16px;left:50%;transform:translateX(-50%) translateY(-80px);background:rgba(10,40,20,.95);border:1.5px solid var(--gold);border-radius:10px;padding:9px 20px;font-size:13px;font-weight:700;color:var(--gold);z-index:300;transition:transform .3s ease;white-space:nowrap;}
.toast.show{transform:translateX(-50%) translateY(0);}
.error-msg{background:rgba(224,48,48,.12);border:1px solid rgba(224,48,48,.3);border-radius:10px;padding:10px 14px;font-size:13px;color:#f08080;margin-top:10px;display:none;}
.error-msg.active{display:block;}
</style>
</head>
<body>
<div class="conn-badge wait" id="conn-badge">⚡ 連接中</div>

<!-- CONNECT -->
<div id="s-connect" class="screen active">
  <div class="logo"><h1>🀄 台灣麻將</h1><p>多人連線版</p></div>
  <div class="card">
    <h2>👤 你的資訊</h2>
    <input class="inp" id="inp-name" placeholder="輸入名字" maxlength="8" style="margin-bottom:12px">
    <h2>🎭 選擇角色</h2>
    <div class="char-grid" id="char-grid"></div>
    <div class="error-msg" id="err-msg"></div>
    <button class="btn-p" onclick="createRoom()" style="margin-bottom:10px">✨ 建立新房間（房主）</button>
    <div class="divider">或加入現有房間</div>
    <div style="display:flex;gap:8px;margin-bottom:10px">
      <input class="inp code-inp" id="inp-code" placeholder="XXXX" maxlength="4">
      <button class="btn-s" onclick="joinRoom()">加入</button>
    </div>
  </div>
</div>

<!-- LOBBY -->
<div id="s-lobby" class="screen">
  <div class="lobby-box">
    <h2>🎮 等待室</h2>
    <div class="room-code-display">
      <div class="code" id="lobby-code"></div>
      <div class="share-url" id="share-url"></div>
    </div>
    <div class="config-box" id="config-box">
      <h3>💰 底數 / 台數設定 <span style="color:var(--gold);font-size:11px">(房主)</span></h3>
      <div class="num-row"><label>底數 (元)</label><input class="inp" id="cfg-base" type="number" value="100" min="1" oninput="sendConfig()"></div>
      <div class="num-row"><label>台數 (元/台)</label><input class="inp" id="cfg-tai" type="number" value="40" min="1" oninput="sendConfig()"></div>
    </div>
    <div id="config-readonly" style="display:none;background:rgba(255,255,255,.04);border-radius:12px;padding:12px;margin-bottom:16px;font-size:13px;color:rgba(255,255,255,.5)">底數/台數由房主設定，等待開局...</div>
    <div class="player-slots" id="player-slots"></div>
    <button class="btn-p" id="btn-start" onclick="sendStart()" disabled>🀄 開始遊戲！</button>
    <div style="text-align:center;font-size:12px;color:rgba(255,255,255,.35);margin-top:8px" id="wait-hint">等待更多玩家加入...</div>
  </div>
</div>

<!-- DICE -->
<div id="s-dice" class="screen">
  <div class="dice-box">
    <h2>🎲 骰骰子決定莊家</h2>
    <p style="color:rgba(255,255,255,.4);font-size:13px;margin-bottom:4px">伺服器自動擲骰</p>
    <div class="dice-row">
      <div class="die" id="d1">⚄</div><div class="die" id="d2">⚂</div><div class="die" id="d3">⚁</div>
    </div>
    <div class="dice-result" id="dice-result" style="display:none"></div>
  </div>
</div>

<!-- GAME -->
<div id="s-game" class="screen">
  <div class="game-layout">
    <div class="topbar">
      <div class="round-info" id="ri">東風 第一局</div>
      <div class="top-stats">
        <span>牌堆: <strong id="deck-cnt">0</strong></span>
        <span>底: <strong id="show-base">100</strong></span>
        <span>台: <strong id="show-tai">40</strong></span>
        <span id="status-txt" style="color:#40f08c;font-weight:700;font-size:12px"></span>
        <button class="btn-hurry" id="btn-hurry" onclick="sendHurry()" style="display:none">⚡ 催！</button>
      </div>
    </div>

      <div class="pp" id="pp4"><div class="ph"><div class="pav" id="av4"></div><div><div class="pnm" id="nm4"></div><div class="pch" id="ch4"></div></div><div class="wb" id="wb4"></div></div><div class="back-row" id="bt4"></div><div class="opp-meld" id="om4"></div><div class="flower-str" id="fl4"></div></div>

        <button class="abtn chi" id="btn-chi" onclick="openChiPicker()" disabled>吃</button>
        <button class="abtn kong" id="btn-kong" onclick="sendKong()" disabled>槓</button>
        <button class="abtn win" id="btn-win" onclick="sendWin()" disabled>🀄 胡！</button>
        <button class="abtn pass" id="btn-pass" onclick="sendPass()" disabled>過</button>
        <button class="abtn settle" onclick="openSettle()">📊 結算</button>

    </div>
  </div>
</div>

<!-- WIN -->
<div class="overlay" id="ov-win">
  <div class="win-modal">
    <div class="wc" id="wm-char"></div>
    <h2 id="wm-title">胡牌！</h2>

<div class="overlay" id="ov-chi">
  <div class="chi-modal">
    <h3>選擇要吃的組合</h3>

  </div>

<!-- SETTLE -->
<div class="overlay" id="ov-settle">
  <div class="settle-modal">
    <h2>📊 目前結算</h2>
    <p>各玩家累計成績</p>
    <div id="settle-rows"></div>
    <button class="btn-p" style="margin-top:4px" onclick="closeOverlay('ov-settle')">繼續</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const WS_URL=(()=>{const p=location.protocol==='https:'?'wss:':'ws:';const h=location.hostname||'localhost';const l=h==='localhost'||h==='127.0.0.1';return`${p}//${h}${l?':3001':''}`;})();
const CHARS=[{id:'mario',e:'🧢',n:'瑪利歐',t:'穩健型'},{id:'luigi',e:'💚',n:'路易吉',t:'謹慎型'},{id:'peach',e:'👸',n:'碧琪公主',t:'優雅型'},{id:'toad',e:'🍄',n:'奇諾比奧',t:'活潑型'},{id:'yoshi',e:'🦕',n:'耀西',t:'樂觀型'},{id:'bowser',e:'🐢',n:'庫巴',t:'積極型'},{id:'donkey',e:'🦍',n:'大金剛',t:'豪爽型'},{id:'rosalina',e:'⭐',n:'羅賽塔',t:'神秘型'},{id:'waluigi',e:'🎭',n:'壞路易吉',t:'狡猾型'},{id:'wario',e:'💛',n:'壞瑪利歐',t:'大膽型'},{id:'daisy',e:'🌼',n:'黛西公主',t:'爽朗型'},{id:'koopa',e:'🐚',n:'庫巴小兵',t:'隨和型'}];
const SUIT_N=['萬','索','餅'];
const HONORS=['東','南','西','北','中','發','白'];
const WINDS=['東','南','西','北'];
const FLOWER_LABELS=['梅','蘭','菊','竹','春','夏','秋','冬'];
const FLOWER_EMOJI=['🌸','🌿','🌼','🎋','🌞','☀️','🍂','❄️'];
const DICE_FACES=['⚀','⚁','⚂','⚃','⚄','⚅'];
// 索子符號 (竹節)
const SUO_SYM=['','🀐','🀑','🀒','🀓','🀔','🀕','🀖','🀗','🀘'];
// 餅的圓圈
const BING_SYM=['','①','②','③','④','⑤','⑥','⑦','⑧','⑨'];
// 萬的漢字
const WAN_KANJI=['','一','二','三','四','五','六','七','八','九'];

let ws=null;
let C={myChar:CHARS[0],myName:'',mySeat:-1,isHost:false,roomCode:'',gameState:null,selIdx:-1,pendingAction:null,chiOpts:[],discPos:[]};

// ── 建立牌元素 ──
function makeTile(t,size,extra,onclick){
  const d=document.createElement('div');
  let cls=`tile ${size} ${extra||''}`;
  let inner='';

  if(t.flower!=null){
    cls+=' flower-t';
    const fe=FLOWER_EMOJI[t.flower]||'🌸';
    const fn=FLOWER_LABELS[t.flower];
    const fs=size==='lg'?'20px':size==='md'?'14px':'11px';
    inner=`<span class="t-flower" style="font-size:${fs}">${fe}</span><span style="font-size:7px;color:#9933aa;margin-top:1px">${fn}</span>`;
  } else if(t.honor!=null){
    const name=HONORS[t.honor];
    const cols={0:'#8b5500',1:'#8b5500',2:'#8b5500',3:'#8b5500',4:'#cc0000',5:'#006600',6:'#666'};
    const col=cols[t.honor]||'#333';
    const fs=size==='lg'?'26px':size==='md'?'19px':'13px';
    inner=`<span class="t-honor" style="font-size:${fs};font-weight:900;color:${col}">${name}</span>`;
  } else {
    const n=t.num, s=t.suit;
    if(s===0){
      // 萬：漢字 + 萬
      const col='#cc1111';
      const fs=size==='lg'?'22px':size==='md'?'16px':'11px';
      const sfs=size==='lg'?'11px':size==='md'?'8px':'7px';
      const tfs=size==='lg'?'10px':size==='md'?'8px':'6px';
      inner=`<span class="tile-corner tl" style="color:${col};font-size:${tfs}">${n}</span><span class="t-wan" style="font-size:${fs}">${WAN_KANJI[n]}</span><span style="font-size:${sfs};color:${col};opacity:.8">萬</span><span class="tile-corner br" style="color:${col};font-size:${tfs}">${n}</span>`;
    } else if(s===1){
      // 索：竹節符號
      const col='#115511';
      const fs=size==='lg'?'20px':size==='md'?'15px':'10px';
      const tfs=size==='lg'?'10px':size==='md'?'8px':'6px';
      inner=`<span class="tile-corner tl" style="color:${col};font-size:${tfs}">${n}</span><span class="t-suo" style="font-size:${fs}">${SUO_SYM[n]||n}</span><span style="font-size:7px;color:${col};opacity:.8">索</span>`;
    } else {
      // 餅：圓圈符號
      const col='#111188';
      const fs=size==='lg'?'22px':size==='md'?'16px':'11px';
      const tfs=size==='lg'?'10px':size==='md'?'8px':'6px';
      inner=`<span class="tile-corner tl" style="color:${col};font-size:${tfs}">${n}</span><span class="t-bing" style="font-size:${fs}">${BING_SYM[n]||n}</span><span style="font-size:7px;color:${col};opacity:.8">餅</span>`;
    }
  }

  d.className=cls;
  d.innerHTML=inner;
  d.title=tileLabel(t);
  if(onclick) d.onclick=onclick;
  return d;
}

function tileKey(t){if(t.flower!=null)return`F${t.flower}`;if(t.honor!=null)return`H${t.honor}`;return`${t.suit}${t.num}`;}
function tileLabel(t){if(t.flower!=null)return FLOWER_LABELS[t.flower];if(t.honor!=null)return HONORS[t.honor];return t.num+SUIT_N[t.suit];}
function sortHand(h){return[...h].sort((a,b)=>{if(a.honor!=null&&b.honor!=null)return a.honor-b.honor;if(a.honor!=null)return 1;if(b.honor!=null)return-1;if(a.suit!==b.suit)return a.suit-b.suit;return a.num-b.num;});}

// ── 棄牌區 - 隨機擺放 ──
function renderDiscardPile(gs){
  const pile=document.getElementById('dpile');
  const discards=gs.discards||[];

  // 每次新局重置
  if(discards.length===0){C.discPos=[];pile.innerHTML='';pile.style.minHeight='110px';document.getElementById('dlbl').textContent='棄牌區';return;}

  // 為新增的牌生成隨機位置
  while(C.discPos.length<discards.length){
    const idx=C.discPos.length;
    const col=idx%10, row=Math.floor(idx/10);
    const baseX=col*56+6, baseY=row*40+4;
    const jx=(Math.random()-.5)*14, jy=(Math.random()-.5)*8;
    const rot=(Math.random()-.5)*16;
    C.discPos.push({x:baseX+jx,y:baseY+jy,r:rot});
  }

  pile.innerHTML='';
  const rows=Math.ceil(discards.length/10);
  pile.style.minHeight=Math.max(110,rows*44+12)+'px';

  discards.forEach((d,i)=>{
    const isLast=i===discards.length-1;
    const pos=C.discPos[i]||{x:(i%10)*56,y:Math.floor(i/10)*40,r:0};
    const el=makeTile(d.tile,'md','dt'+(isLast?' last-d':''));
    el.style.left=pos.x+'px';
    el.style.top=pos.y+'px';
    el.style.transform=`rotate(${pos.r}deg)`;
    el.style.zIndex=i+1;
    pile.appendChild(el);
  });

  const lbl=document.getElementById('dlbl');
  lbl.textContent=gs.lastDiscard?`${gs.players[gs.lastDiscardBy]?.name||''} 打: ${tileLabel(gs.lastDiscard)}`:'棄牌區';
}

// ── INIT ──
function renderCharGrid(){
  const g=document.getElementById('char-grid');g.innerHTML='';
  CHARS.forEach((c,i)=>{
    const d=document.createElement('div');
    d.className='cc'+(i===0?' sel':'');
    d.innerHTML=`<div class="ce">${c.e}</div><div class="cn">${c.n}</div><div class="ct">${c.t}</div>`;
    d.onclick=()=>{document.querySelectorAll('.cc').forEach(x=>x.classList.remove('sel'));d.classList.add('sel');C.myChar=c;};
    g.appendChild(d);
  });
  C.myChar=CHARS[0];
}

function connectWS(){
  setBadge('wait','⚡ 連接中...');
  try{ws=new WebSocket(WS_URL);}catch(e){setBadge('err','❌ 無法連線');return;}
  ws.onopen=()=>setBadge('ok','✅ 已連線');
  ws.onclose=()=>{setBadge('err','❌ 已斷線');setTimeout(connectWS,3000);};
  ws.onerror=()=>setBadge('err','❌ 連線錯誤');
  ws.onmessage=(ev)=>{try{handleMsg(JSON.parse(ev.data));}catch(e){console.error(e);}};
}
function setBadge(t,x){const b=document.getElementById('conn-badge');b.className=`conn-badge ${t}`;b.textContent=x;}
function showErr(m){const e=document.getElementById('err-msg');e.textContent=m;e.classList.add('active');setTimeout(()=>e.classList.remove('active'),3000);}
function createRoom(){const n=document.getElementById('inp-name').value.trim();if(!n){showErr('請輸入名字');return;}if(!ws||ws.readyState!==WebSocket.OPEN){showErr('伺服器未連線');return;}C.myName=n;send({type:'createRoom',name:n,char:C.myChar});}
function joinRoom(){const n=document.getElementById('inp-name').value.trim();const c=document.getElementById('inp-code').value.trim().toUpperCase();if(!n){showErr('請輸入名字');return;}if(c.length!==4){showErr('房間碼需要4碼');return;}if(!ws||ws.readyState!==WebSocket.OPEN){showErr('伺服器未連線');return;}C.myName=n;C.roomCode=c;send({type:'joinRoom',name:n,char:C.myChar,code:c});}

// ── 訊息處理 ──
function handleMsg(msg){
  switch(msg.type){
    case 'roomCreated':C.mySeat=msg.seatIdx;C.isHost=msg.isHost;C.roomCode=msg.code;showLobby();break;
    case 'roomJoined':C.mySeat=msg.seatIdx;C.isHost=false;C.roomCode=msg.code;showLobby();break;
    case 'lobby':updateLobby(msg);break;
    case 'configUpdated':document.getElementById('cfg-base').value=msg.base;document.getElementById('cfg-tai').value=msg.tai;break;
    case 'error':showErr(msg.msg);break;
    case 'gameStart':C.discPos=[];show('s-dice');toast('遊戲開始！');break;
    case 'dice':animateDice(msg);break;
    case 'roundStart':C.discPos=[];toast(`第 ${msg.round} 局開始！`);break;
    case 'state':C.gameState=msg;C.pendingAction=msg.pendingAction;renderGame();break;
    case 'discard':setStatus(`${msg.seat===C.mySeat?'你':(C.gameState?.players[msg.seat]?.name||'')} 打出 ${msg.label}`);break;
    case 'pong':toast(`${C.gameState?.players[msg.seat]?.name||''} 碰！`);break;
    case 'chi':toast('吃！');break;
    case 'kong':toast('槓！');break;
    case 'flower':toast(msg.seat===C.mySeat?'🌸 補花！':`${C.gameState?.players[msg.seat]?.name||''} 補花`);break;
    case 'hurry':toast(`⚡ ${msg.fromName} 催促 ${msg.targetName}！`);break;
    case 'win':closeOverlay('ov-chi');showWinModal(msg);break;
    case 'exhaust':toast('牌堆耗盡！流局');break;
    case 'playerLeft':toast(`座位${msg.seat+1}的玩家離線`);break;
  }
}

// ── Lobby ──
function showLobby(){
  show('s-lobby');
  document.getElementById('lobby-code').textContent=C.roomCode;
  document.getElementById('share-url').textContent=`分享: ${location.origin}?room=${C.roomCode}`;
  document.getElementById('config-box').style.display=C.isHost?'':'none';
  document.getElementById('config-readonly').style.display=C.isHost?'none':'';
  document.getElementById('btn-start').style.display=C.isHost?'':'none';
}
function updateLobby(msg){
  if(!document.getElementById('s-lobby').classList.contains('active'))showLobby();
  const slots=document.getElementById('player-slots');
  const players=msg.players||[];
  slots.innerHTML='';
  for(let i=0;i<4;i++){
    const p=players[i];const div=document.createElement('div');
    if(p){div.className='pslot filled';div.innerHTML=`<div class="pem">${p.char?.e||'🎮'}</div><div><div class="pnm">${p.name}</div><div class="pts">${p.char?.n||''} · ${p.char?.t||''}</div></div>${i===0?'<div class="pbadge">房主</div>':''}${i===C.mySeat?'<div class="pbadge" style="background:rgba(64,240,140,.15);border-color:rgba(64,240,140,.3);color:#40f08c">你</div>':''}`;}
    else{div.className='pslot empty';div.innerHTML=`<div class="pem">👤</div><div class="pnm">等待玩家 ${i+1}</div>`;}
    slots.appendChild(div);
  }
  if(C.isHost){document.getElementById('btn-start').disabled=players.length<2;document.getElementById('wait-hint').textContent=players.length>=4?'人數已滿！可以開始':`已 ${players.length}/4 人，至少需2人`;}
}
function sendConfig(){if(!C.isHost)return;send({type:'setConfig',base:parseInt(document.getElementById('cfg-base').value)||100,tai:parseInt(document.getElementById('cfg-tai').value)||40});}
function sendStart(){send({type:'startGame'});}

// ── Dice ──
function animateDice(msg){
  const [d1,d2,d3]=[document.getElementById('d1'),document.getElementById('d2'),document.getElementById('d3')];
  let count=0;
  const iv=setInterval(()=>{
    d1.textContent=DICE_FACES[Math.floor(Math.random()*6)];
    d2.textContent=DICE_FACES[Math.floor(Math.random()*6)];
    d3.textContent=DICE_FACES[Math.floor(Math.random()*6)];
    count++;
    if(count>10){
      clearInterval(iv);
      d1.textContent=DICE_FACES[msg.values[0]-1];
      d2.textContent=DICE_FACES[msg.values[1]-1];
      d3.textContent=DICE_FACES[msg.values[2]-1];
      const r=document.getElementById('dice-result');
      r.style.display='block';
      r.innerHTML=`點數: <strong>${msg.total}</strong> (${msg.values.join('+')})<br>莊家: <strong>${msg.dealerName}</strong><br>方向: <strong>${msg.direction}</strong>`;
      setTimeout(()=>show('s-game'),1800);
    }
  },70);
}

// ── Game render ──
function renderGame(){
  const gs=C.gameState;if(!gs)return;
  show('s-game');
  const wn=['東','南','西','北'];
  document.getElementById('ri').textContent=`${wn[Math.floor((gs.round-1)/4)]||'北'}風 第${((gs.round-1)%4)+1}局`;
  document.getElementById('deck-cnt').textContent=gs.deckCount;
  document.getElementById('show-base').textContent=gs.base;
  document.getElementById('show-tai').textContent=gs.tai;

  const isMyTurn=gs.currentTurn===C.mySeat;
  const hurry=document.getElementById('btn-hurry');
  hurry.style.display=(!isMyTurn&&gs.phase!=='waiting')?'':'none';
  if(!isMyTurn&&gs.players[gs.currentTurn]) hurry.textContent=`⚡ 催 ${gs.players[gs.currentTurn].name}！`;

  // 對手
  [1,2,3].map(o=>(C.mySeat+o)%4).forEach((si,idx)=>{
    const ui=idx+2;const p=gs.players[si];if(!p)return;
    document.getElementById(`av${ui}`).textContent=p.char?.e||'👤';
    document.getElementById(`nm${ui}`).textContent=p.name;
    document.getElementById(`ch${ui}`).textContent=`${p.chips>=0?'+':''}${p.chips.toLocaleString()}`;
    document.getElementById(`wb${ui}`).textContent=WINDS[p.wind]||'';
    document.getElementById(`pp${ui}`).classList.toggle('active',gs.currentTurn===si);
    document.getElementById(`pp${ui}`).classList.toggle('dealer',si===gs.dealer);
    const bt=document.getElementById(`bt${ui}`);bt.innerHTML='';
    for(let i=0;i<(p.handCount||0);i++){const b=document.createElement('div');b.className='tb-back';bt.appendChild(b);}
    const om=document.getElementById(`om${ui}`);om.innerHTML='';
    (p.melds||[]).forEach(m=>m.tiles.forEach(t=>om.appendChild(makeTile(t,'sm','dt'))));
    document.getElementById(`fl${ui}`).textContent=p.flowers?.length>0?'🌸×'+p.flowers.length:'';
  });

  const me=gs.players[C.mySeat];
  if(me){
    document.getElementById('av1').textContent=me.char?.e||'👤';
    document.getElementById('nm1').textContent=me.name;
    document.getElementById('ch1').textContent=`${me.chips>=0?'+':''}${me.chips.toLocaleString()} 籌碼`;
    document.getElementById('wb1').textContent=WINDS[me.wind]||'';
    document.getElementById('fl1').textContent=me.flowers?.length>0?'🌸×'+me.flowers.length:'';
    document.querySelector('.self-panel').style.borderColor=isMyTurn?'var(--gold)':'rgba(255,255,255,.15)';
  }

  renderSelfHand(me,gs);
  renderDiscardPile(gs);
  updateButtons(gs);

  const hint=document.getElementById('sel-hint');
  if(isMyTurn&&gs.phase==='discard')
    hint.textContent=C.selIdx>=0?'✅ 已選牌 → 按「出牌」打出':'👆 點選要打出的牌，再按「出牌」';
  else hint.textContent='';
}

function renderSelfHand(me,gs){
  if(!me)return;
  const c=document.getElementById('self-tiles');c.innerHTML='';
  (me.melds||[]).forEach(meld=>{
    const g=document.createElement('div');g.className='meld-g';
    meld.tiles.forEach(t=>g.appendChild(makeTile(t,'lg','dt')));
    c.appendChild(g);
    const sep=document.createElement('div');sep.className='hsep';c.appendChild(sep);
  });
  const canPick=gs.currentTurn===C.mySeat&&gs.phase==='discard';
  sortHand(me.hand||[]).forEach((tile,i)=>{
    const el=makeTile(tile,'lg',i===C.selIdx?'sel':'',()=>{
      if(canPick){C.selIdx=i;renderSelfHand(me,gs);updateButtons(gs);}
    });
    c.appendChild(el);
  });
}

function updateButtons(gs){
  const isMy=gs.currentTurn===C.mySeat;
  const act=C.pendingAction||{};
  document.getElementById('btn-draw').disabled=!(isMy&&gs.phase==='draw');
  document.getElementById('btn-disc').disabled=!(isMy&&gs.phase==='discard'&&C.selIdx>=0);
  document.getElementById('btn-pong').disabled=!act.canPong;
  document.getElementById('btn-chi').disabled=!act.canChi;
  document.getElementById('btn-kong').disabled=!(act.canKong||(isMy&&gs.phase==='discard'&&checkSelfKong()));
  document.getElementById('btn-win').disabled=!act.canWin;
  document.getElementById('btn-pass').disabled=!(act.canPong||act.canChi||act.canKong||act.canWin);
}

function checkSelfKong(){
  const gs=C.gameState;if(!gs)return false;
  const me=gs.players[C.mySeat];if(!me)return false;
  const counts={};(me.hand||[]).forEach(t=>{const k=tileKey(t);counts[k]=(counts[k]||0)+1;});
  return Object.values(counts).some(c=>c>=4);
}
function setStatus(t){document.getElementById('status-txt').textContent=t;}

// ── Actions ──
function sendDraw(){send({type:'draw'});}
function sendDiscard(){
  if(C.selIdx===-1){toast('請先點選要打出的牌');return;}
  const gs=C.gameState;if(!gs)return;
  const tile=sortHand(gs.players[C.mySeat]?.hand||[])[C.selIdx];
  if(!tile)return;
  C.selIdx=-1;send({type:'discard',tile});
}
function sendPong(){send({type:'pong'});}
function sendKong(){send({type:'kong'});}
function sendWin(){send({type:'win'});}
function sendPass(){send({type:'passAction'});}
function sendHurry(){
  const gs=C.gameState;if(!gs)return;
  send({type:'hurry',targetSeat:gs.currentTurn});
  const b=document.getElementById('btn-hurry');
  b.disabled=true;b.textContent='已催促...';
  setTimeout(()=>{b.disabled=false;const p=C.gameState?.players[C.gameState?.currentTurn];b.textContent=`⚡ 催 ${p?.name||''}！`;},5000);
}
function openChiPicker(){
  const act=C.pendingAction;if(!act?.canChi||!act.chiOpts)return;
  C.chiOpts=act.chiOpts;
  if(C.chiOpts.length===1){sendChiOpt(0);return;}
  const opts=document.getElementById('chi-opts');opts.innerHTML='';
  C.chiOpts.forEach((opt,i)=>{
    const div=document.createElement('div');div.className='chi-opt';
    opt.forEach(t=>div.appendChild(makeTile(t,'md','dt')));
    div.onclick=()=>{closeOverlay('ov-chi');sendChiOpt(i);};
    opts.appendChild(div);
  });
  document.getElementById('ov-chi').classList.add('active');
}
function sendChiOpt(i){send({type:'chi',optIdx:i});}
function sendNextRound(){if(!C.isHost)return;C.discPos=[];send({type:'nextRound'});closeOverlay('ov-win');}

// ── Win modal ──
function showWinModal(msg){
  document.getElementById('wm-char').textContent=msg.winnerChar?.e||'🀄';
  document.getElementById('wm-title').textContent=msg.seat===C.mySeat?'🎉 你胡了！':`${msg.winnerName} 胡牌！`;
  document.getElementById('wm-method').textContent=msg.method;
  document.getElementById('wm-yaku').innerHTML=msg.yakus.map(y=>`<div class="yr"><span class="yn">${y.name}</span><span class="ys">${y.tai}台</span></div>`).join('')+`<div class="ytotal"><span>合計</span><span>${msg.totalTai}台 = ${msg.totalAmt}元</span></div>`;
  document.getElementById('wm-pay').innerHTML=(msg.playerNames||[]).map((n,i)=>{const d=msg.pays[i]||0;const cls=d>0?'pos':d<0?'neg':'';return`<div class="pr"><span class="pn">${msg.playerChars?.[i]?.e||''} ${n}</span><span class="${cls}">${d>0?'+':''}${d.toLocaleString()}</span></div>`;}).join('');
  document.getElementById('wm-next').style.display=C.isHost?'':'none';
  document.getElementById('wm-wait').style.display=C.isHost?'none':'';
  document.getElementById('ov-win').classList.add('active');
}

// ── Settle ──
function openSettle(){
  const gs=C.gameState;if(!gs)return;
  document.getElementById('settle-rows').innerHTML=gs.players.map(p=>{const d=p.chips;const cls=d>0?'pos':d<0?'neg':'';return`<div class="settle-row"><div class="sc">${p.char?.e||'👤'}</div><div class="si"><div class="sn">${p.name}</div><div class="ss">累積</div></div><div class="sd ${cls}">${d>0?'+':''}${d.toLocaleString()}</div></div>`;}).join('');
  document.getElementById('ov-settle').classList.add('active');
}

// ── Utils ──
function send(o){if(ws&&ws.readyState===WebSocket.OPEN)ws.send(JSON.stringify(o));}
function show(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');}
function closeOverlay(id){document.getElementById(id).classList.remove('active');}
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),2500);}

renderCharGrid();
connectWS();
const urlRoom=new URLSearchParams(location.search).get('room');
if(urlRoom)document.getElementById('inp-code').value=urlRoom.toUpperCase();
</script>
</body>
</html>
